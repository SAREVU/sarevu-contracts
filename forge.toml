[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "contracts/test"
script = "contracts/script"
cache_path = "cache"
solc_version = "0.8.20"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
verbosity = 2
fs_permissions = [{ access = "read-write", path = "./" }]

[fuzz]
runs = 10000

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
